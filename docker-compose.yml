services:
  backend:
    build: ./backend
    volumes:
      - skills-repo:/app/repo
      - db-data:/app/data
    env_file: .env
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  skills-repo:
  db-data:
